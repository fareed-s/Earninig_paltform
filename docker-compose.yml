version: '3.8'

services:
  # ============ MongoDB ============
  mongodb:
    image: mongo:7
    container_name: ep-mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
      - mongo_backup:/backup
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_strong_password}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============ Backend API ============
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ep-backend
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme_strong_password}@mongodb:27017/earning-platform?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_random_secret_key}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@platform.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - UPLOAD_PATH=./uploads
      - MAX_FILE_SIZE=5242880
    volumes:
      - upload_data:/app/uploads
    networks:
      - app-network

  # ============ Frontend ============
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: ep-frontend
    restart: always
    networks:
      - app-network

  # ============ Nginx Reverse Proxy ============
  nginx:
    image: nginx:alpine
    container_name: ep-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - app-network

volumes:
  mongo_data:
    driver: local
  mongo_backup:
    driver: local
  upload_data:
    driver: local

networks:
  app-network:
    driver: bridge
