upstream backend {
    server backend:5000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name zahidanees.store www.zahidanees.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zahidanees.store www.zahidanees.store;

    ssl_certificate /etc/letsencrypt/live/zahidanees.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zahidanees.store/privkey.pem;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 300s;
    }

    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control public;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# === dyeing.labflow.store HTTP -> HTTPS redirect ===
server {
    listen 80;
    server_name dyeing.labflow.store;
    return 301 https://$host$request_uri;
}

# === dyeing.labflow.store HTTPS server ===
server {
    listen 443 ssl;
    server_name dyeing.labflow.store;
    ssl_certificate     /etc/letsencrypt/live/dyeing.labflow.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dyeing.labflow.store/privkey.pem;
    client_max_body_size 10M;

    # Docker's embedded DNS lives at 127.0.0.11 inside any user-defined
    # network. Using a variable + resolver forces nginx to re-resolve the
    # upstream every `valid=30s` instead of caching the IP at config-load
    # time. Without this, when docker compose up --build gives the web
    # container a new IP, nginx keeps trying the old one and serves 502.
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $dyeing_upstream "dyeing-erp-web:80";

    location / {
        proxy_pass http://$dyeing_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}

# === medpro.labflow.store HTTP -> HTTPS redirect ===
server {
    listen 80;
    server_name medpro.labflow.store;
    return 301 https://$host$request_uri;
}

# === medpro.labflow.store HTTPS server (proxies to medstore-web container) ===
server {
    listen 443 ssl;
    server_name medpro.labflow.store;
    ssl_certificate     /etc/letsencrypt/live/medpro.labflow.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medpro.labflow.store/privkey.pem;
    client_max_body_size 25M;

    # Re-resolve the upstream every 30s so docker compose rebuilds (which give
    # the web container a fresh IP) don't leave nginx pointing at the old one.
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $medstore_upstream "medstore-web:80";

    location / {
        proxy_pass http://$medstore_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}
